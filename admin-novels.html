<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة الروايات | فلامنكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --main: #d63384; --bg: #121212; --card: #1e1e1e; --text: #eee; --danger: #dc3545; --warning: #ffc107; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            direction: rtl; 
        }
        
        .header { background: linear-gradient(135deg, var(--main), #9d174d); padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header h1 { margin: 0; font-size: 1.3rem; color: white; }

        .search-wrapper { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: var(--card); color: white; font-size: 16px; transition: 0.3s; }
        .search-input:focus { border-color: var(--main); }

        .novel-card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px; border-right: 5px solid var(--main); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .novel-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; color: var(--main); }
        .author-name { font-size: 0.85rem; color: #aaa; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }

        /* خانة إدخال السبب - تشبه ستايل لوحة الرقابة */
        .reason-container { margin-top: 10px; background: rgba(214, 51, 132, 0.05); padding: 10px; border-radius: 10px; border: 1px dashed #444; }
        .reason-input { width: 100%; background: transparent; border: none; color: var(--warning); font-size: 13px; padding: 5px; outline: none; }
        .reason-input::placeholder { color: #666; }

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; transition: 0.2s; }
        .btn-delete { background: var(--danger); box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2); }
        .btn:active { transform: scale(0.96); }

        #loading { text-align: center; color: var(--main); margin-top: 20px; }
        #no-data { text-align: center; padding: 30px; color: #888; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-book-reader"></i> إدارة الروايات | فلامنكو</h1>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchBox" class="search-input" placeholder="ابحث عن رواية أو كاتب..." oninput="handleSearch()">
    </div>

    <div id="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل الروايات...</div>
    <div id="no-data">لا توجد نتائج مطابقة لبحثك.</div>
    <div id="novels-list"></div>

    <script>
        const S_URL = 'https://yboxheficowekfzjatti.supabase.co';
        const S_KEY = 'sb_publishable_a482mpjOWq2R5Bil808Vng_DObZcycS';
        const _sb = window.supabase.createClient(S_URL, S_KEY);

        let allStories = [];

        async function init() {
            try {
                const { data, error } = await _sb.from('stories').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                allStories = data || [];
                render(allStories);
            } catch (e) {
                console.error(e);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function handleSearch() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allStories.filter(s => 
                (s.title && s.title.toLowerCase().includes(term)) || 
                (s.author_name && s.author_name.toLowerCase().includes(term))
            );
            render(filtered);
        }

        function render(stories) {
            const list = document.getElementById('novels-list');
            if (stories.length === 0) {
                document.getElementById('no-data').style.display = 'block';
                list.innerHTML = '';
                return;
            }
            document.getElementById('no-data').style.display = 'none';
            list.innerHTML = stories.map(s => `
                <div class="novel-card">
                    <div class="novel-title">${s.title}</div>
                    <div class="author-name"><i class="fas fa-pen-nib"></i> الكاتب: ${s.author_name || 'مجهول'}</div>

                    <div class="reason-container">
                        <div style="font-size: 11px; color: var(--warning); margin-bottom: 5px;">
                            <i class="fas fa-comment-dots"></i> سبب الحذف (سيصل للكاتب):
                        </div>
                        <input type="text" class="reason-input" id="reason-${s.id}" 
                               placeholder="اكتب هنا مثلاً: محتوى غير لائق...">
                    </div>

                    <div class="actions">
                        <button class="btn btn-delete" onclick="processDelete('${s.id}', '${s.title}', '${s.cover_url}', '${s.user_id}')">
                            <i class="fas fa-trash-alt"></i> حذف الرواية نهائياً
                        </button>
                    </div>
                </div>`).join('');
        }

        async function processDelete(id, title, cover, authorId) {
            const reasonInput = document.getElementById(`reason-${id}`);
            const reason = reasonInput.value.trim();

            if (!reason) {
                alert("⚠️ يرجى كتابة سبب الحذف أولاً لإخطار الكاتب.");
                reasonInput.focus();
                return;
            }

            if (!confirm(`حذف "${title}"؟ لا يمكن التراجع.`)) return;

            try {
                document.getElementById('loading').style.display = 'block';

                // 1. إرسال إشعار للكاتب
                await _sb.from('notifications').insert({
                    recipient_id: authorId,
                    title: "حذف محتوى مخالف ⚠️",
                    message: `تم حذف روايتك "${title}" لمخالفتها قوانين المنصة. السبب: ${reason}`,
                    type: 'system'
                });

                // 2. حذف صورة الغلاف من الستورج
                if (cover && cover.includes('story_covers')) {
                    const filePath = cover.split('/').pop();
                    await _sb.storage.from('story_covers').remove([filePath]);
                }

                // 3. حذف البيانات
                const { error } = await _sb.from('stories').delete().eq('id', id);
                if (error) throw error;

                alert("✅ تم الحذف وإخطار الكاتب بنجاح.");
                allStories = allStories.filter(item => item.id !== id);
                render(allStories);

            } catch (e) {
                alert("حدث خطأ: " + e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
